<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Forms</title>
</head>
<body>
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name" name="name" placeholder="Write your name">
        <br>
        <br>
        <label for="Email">Email: </label>
        <input type="text" id="Email" name="Email" placeholder="Write your email">
        <br>
        <br>
        Message:
        <br>
        <textarea rows="4" cols="34"></textarea>
        <br>
        <br>
        Rate us out of 5:
        <br>
        <input type="radio" id="1" name="Rated" value="1">
        <label for="1">1</label>
        <br>
        <input type="radio" id="2" name="Rated" value="2">
        <label for="2">2</label>
        <br>
        <input type="radio" id="3" name="Rated" value="3">
        <label for="3">3</label>
        <br>
        <input type="radio" id="4" name="Rated" value="4">
        <label for="4">4</label>
        <br>
        <input type="radio" id="5" name="Rated" value="5">
        <label for="5">5</label>
        <br>
        <br>
        <br>
        <input type="submit" value="Send your message">
    </form>
</body>
</html>
